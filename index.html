<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Green Tech Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Hero Section -->
<section id="hero">
  <img src="https://via.placeholder.com/1200x400?text=Environment" alt="Green Tech">
  <h1>Technology for a Greener Future</h1>
</section>

<!-- Solutions Section -->
<section id="solutions">
  <h2>Our Green Solutions</h2>
  <ul>
    <li>Solar Energy</li>
    <li>Waste Management</li>
    <li>Smart Irrigation</li>
  </ul>
</section>

<!-- Contact Form Section -->
<section id="contact">
  <h2>Contact Us</h2>
  <form>
    <input type="text" name="name" placeholder="Họ tên" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Lời nhắn"></textarea>
    <button type="submit">Gửi</button>
  </form>
</section>

</body>
</html>
